<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="leftWingGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="30%" stop-color="#0288D1"/>
      <stop offset="60%" stop-color="#00ACC1"/>
      <stop offset="80%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="rightWingGrad" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="30%" stop-color="#0288D1"/>
      <stop offset="60%" stop-color="#00ACC1"/>
      <stop offset="80%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C6D026"/>
      <stop offset="40%" stop-color="#FDD835"/>
      <stop offset="70%" stop-color="#FFA726"/>
      <stop offset="100%" stop-color="#EF6C00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left wing -->
  <g filter="url(#glow)">
    <!-- Left wing main feathers -->
    <path d="M 190 120 C 160 90, 100 70, 30 60 C 60 85, 90 95, 110 105 C 80 95, 40 90, 10 95 C 45 115, 80 118, 110 120 C 75 118, 35 125, 8 140 C 45 145, 85 140, 115 135 C 85 142, 50 155, 25 170 C 60 168, 100 158, 130 148 C 110 158, 90 172, 75 185 C 108 177, 140 162, 160 148 L 190 120 Z" fill="url(#leftWingGrad)" opacity="0.95"/>
    <!-- Left wing inner curve -->
    <path d="M 190 120 C 175 110, 155 100, 135 98 C 150 105, 162 112, 170 118 L 190 120 Z" fill="url(#centerGrad)" opacity="0.8"/>
  </g>

  <!-- Right wing -->
  <g filter="url(#glow)">
    <!-- Right wing main feathers -->
    <path d="M 210 120 C 240 90, 300 70, 370 60 C 340 85, 310 95, 290 105 C 320 95, 360 90, 390 95 C 355 115, 320 118, 290 120 C 325 118, 365 125, 392 140 C 355 145, 315 140, 285 135 C 315 142, 350 155, 375 170 C 340 168, 300 158, 270 148 C 290 158, 310 172, 325 185 C 292 177, 260 162, 240 148 L 210 120 Z" fill="url(#rightWingGrad)" opacity="0.95"/>
    <!-- Right wing inner curve -->
    <path d="M 210 120 C 225 110, 245 100, 265 98 C 250 105, 238 112, 230 118 L 210 120 Z" fill="url(#centerGrad)" opacity="0.8"/>
  </g>

  <!-- Center body / meeting point -->
  <path d="M 190 120 C 193 130, 197 145, 200 160 C 203 145, 207 130, 210 120 C 205 115, 200 112, 195 115 Z" fill="url(#centerGrad)" opacity="0.9"/>

  <!-- Wing tips glow highlights -->
  <ellipse cx="200" cy="118" rx="15" ry="8" fill="#FDD835" opacity="0.3"/>
</svg>
