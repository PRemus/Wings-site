  " fill="url(#wingGrad)"/>

  <!-- Right wing (mirror) -->
  <path d="
    M256 265
    C282 248, 317 235, 352 228
    C382 222, 417 220, 452 224
    C432 232, 407 238, 390 244
    C417 237, 444 238, 467 248
    C442 258, 414 260, 394 256
    C422 256, 447 265, 464 278
    C437 273, 407 268, 384 262
    L 256 265 Z
  " fill="url(#wingGrad)" transform="scale(-1,1) translate(-512,0)"/>

  <!-- Center gold knot -->
  <ellipse cx="256" cy="272" rx="22" ry="28" fill="url(#centerGrad)"/>
  <ellipse cx="256" cy="260" rx="14" ry="10" fill="#FDD835"/>
